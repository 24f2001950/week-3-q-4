name: Daily Auto Commit

permissions:
  contents: write

on:
  schedule:
    - cron: '15 10 * * *'   # runs daily at 10:15 UTC (fixed time required)
  workflow_dispatch:        # allows manual trigger (VERY IMPORTANT for testing)

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup git
        run: |
          git config user.name "github-actions"
          git config user.email "24f2001950@ds.study.iitm.ac.in"

      - name: Update file
        run: |
          echo "Last run: $(date)" >> daily-log.txt

      - name: Commit changes 24f2001950@ds.study.iitm.ac.in
        run: |
          git add .
          git commit -m "Daily automated commit" || echo "No changes"
          git push
